<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ensaio Ritual — Loja Filhos de Salomão Nº 905</title>
<style>
:root {
  --gold:#b8960c; --gold-light:#f5e9b0; --gold-dark:#7a6008;
  --ink:#1a1610; --parchment:#faf6ee; --parchment-dark:#f0e9d8;
  --stone:#6b6358; --stone-light:#c4bfb5;
  --blue:#1a3a5c; --green:#2a5a2a; --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Georgia',serif;background:var(--parchment);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;}

/* ── TELA DE SELEÇÃO ── */
#screen-select{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:2rem 1rem;}
.sel-logo{width:130px;margin-bottom:1rem;}
.sel-loja{font-size:10px;letter-spacing:.18em;color:var(--gold-dark);text-transform:uppercase;text-align:center;margin-bottom:.3rem;}
.sel-title{font-size:22px;font-weight:normal;color:var(--ink);text-align:center;margin-bottom:.3rem;}
.sel-sub{font-size:13px;color:var(--stone);font-style:italic;text-align:center;margin-bottom:2rem;}
.sel-divider{width:60px;height:2px;background:var(--gold);margin:0 auto 2rem;}
.sel-label{font-size:12px;letter-spacing:.1em;color:var(--stone);text-transform:uppercase;margin-bottom:1rem;text-align:center;}
.cargo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;width:100%;max-width:700px;}
.cargo-btn{display:flex;flex-direction:column;align-items:flex-start;gap:4px;padding:14px 16px;border:1px solid var(--stone-light);border-radius:10px;background:#fff;cursor:pointer;text-align:left;transition:all .15s;font-family:'Georgia',serif;}
.cargo-btn:hover{border-color:var(--gold);background:var(--gold-light);}
.cargo-btn .cargo-nome{font-size:15px;font-weight:bold;color:var(--ink);}
.cargo-btn .cargo-hist{font-size:12px;color:var(--stone);font-style:italic;}
.cargo-btn .cargo-desc{font-size:11px;color:var(--stone-light);margin-top:2px;}

/* ── HEADER APP ── */
header{background:var(--ink);color:var(--gold-light);border-bottom:3px solid var(--gold);}
.header-inner{display:flex;align-items:center;gap:14px;padding:.8rem 1rem;}
.header-logo{width:44px;flex-shrink:0;}
.header-text{flex:1;}
.header-loja{font-size:9px;letter-spacing:.16em;color:var(--gold);text-transform:uppercase;}
.header-title{font-size:16px;font-weight:normal;}
.header-cargo{font-size:11px;color:var(--stone-light);font-style:italic;}
.header-back{background:none;border:1px solid var(--stone);color:var(--stone-light);font-size:11px;padding:5px 10px;border-radius:var(--radius);cursor:pointer;font-family:'Georgia',serif;white-space:nowrap;}
.header-back:hover{border-color:var(--gold);color:var(--gold);}

.ritual-tabs{display:flex;background:var(--ink);border-bottom:2px solid var(--gold-dark);overflow-x:auto;}
.ritual-tab{flex:1;min-width:64px;padding:8px 5px;font-family:'Georgia',serif;font-size:11px;color:var(--stone-light);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;white-space:nowrap;text-align:center;transition:all .15s;}
.ritual-tab:hover{color:var(--gold-light);}
.ritual-tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:bold;}

main{flex:1;max-width:720px;margin:0 auto;width:100%;padding:1.1rem 1rem 2rem;display:flex;flex-direction:column;gap:.85rem;}
.section-heading{font-size:10px;letter-spacing:.14em;color:var(--stone);text-transform:uppercase;padding:.2rem 0;border-bottom:1px solid var(--stone-light);}

.status-bar{display:flex;align-items:center;gap:10px;padding:7px 11px;background:var(--parchment-dark);border:1px solid var(--stone-light);border-radius:var(--radius);font-size:13px;color:var(--stone);}
.status-dot{width:10px;height:10px;border-radius:50%;background:var(--stone-light);flex-shrink:0;}
.status-dot.listening{background:#e05c2a;animation:pulse 1s infinite;}
.status-dot.speaking{background:var(--gold);animation:pulse .7s infinite;}
.status-dot.waiting{background:#4a8c4a;}
.status-dot.thinking{background:var(--blue);animation:pulse .9s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.status-text{flex:1;}
.vol-btn{font-size:18px;cursor:pointer;background:none;border:none;padding:2px 4px;color:var(--stone);}

.chat-area{display:flex;flex-direction:column;gap:.6rem;min-height:160px;}
.msg{display:flex;flex-direction:column;gap:3px;max-width:90%;}
.msg.other{align-self:flex-start;}
.msg.me{align-self:flex-end;}
.msg-who{font-size:10px;letter-spacing:.05em;color:var(--stone);padding:0 4px;}
.msg.me .msg-who{text-align:right;color:var(--blue);}
.msg-bubble{padding:9px 13px;border-radius:12px;font-size:15px;line-height:1.65;}
.msg.other .msg-bubble{background:#fff;border:1px solid var(--stone-light);border-bottom-left-radius:4px;}
.msg.me .msg-bubble{background:var(--blue);color:#e8f0fb;border-bottom-right-radius:4px;}
.msg.me.skip .msg-bubble{background:var(--green);}
.signal-tag{display:inline-block;font-size:11px;background:var(--gold-light);color:var(--gold-dark);border-radius:4px;padding:1px 6px;margin-right:5px;}
.note-bubble{background:#fef9e7;border:1px solid #e8d97a;border-radius:8px;padding:7px 12px;font-size:12px;color:#7a6208;font-style:italic;align-self:center;max-width:82%;text-align:center;}
.typing-indicator{display:flex;align-items:center;gap:5px;padding:9px 13px;background:#fff;border:1px solid var(--stone-light);border-radius:12px;border-bottom-left-radius:4px;max-width:70px;align-self:flex-start;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--stone-light);animation:blink 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
.feedback-box{border-radius:10px;padding:9px 13px;font-size:13px;line-height:1.5;align-self:center;max-width:92%;}
.feedback-box.ok{background:#edf7ed;border:1px solid #8bc98b;color:#2a6a2a;}
.feedback-box.fix{background:#fdf3e7;border:1px solid #e8a84a;color:#7a4a08;}

.input-area{background:#fff;border:1.5px solid var(--stone-light);border-radius:12px;padding:10px 12px;box-shadow:0 2px 10px rgba(26,22,16,.07);display:flex;flex-direction:column;gap:8px;}
.input-label{font-size:10px;letter-spacing:.08em;color:var(--blue);text-transform:uppercase;}
textarea{width:100%;font-family:'Georgia',serif;font-size:15px;color:var(--ink);border:none;outline:none;resize:none;background:transparent;min-height:48px;line-height:1.6;}
textarea::placeholder{color:var(--stone-light);}
.input-actions{display:flex;justify-content:space-between;align-items:center;gap:6px;}
.left-actions{display:flex;gap:6px;}
.mic-btn{width:42px;height:42px;border-radius:50%;border:2px solid var(--stone-light);background:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--stone);}
.mic-btn.active{border-color:#e05c2a;background:#fff0ec;color:#e05c2a;animation:pulse 1s infinite;}
.mic-btn:disabled{opacity:.35;cursor:not-allowed;animation:none;}
button.hint-btn{padding:7px 11px;border-radius:var(--radius);border:1px solid var(--gold-dark);color:var(--gold-dark);background:transparent;font-family:'Georgia',serif;font-size:12px;cursor:pointer;}
button.hint-btn:hover{background:var(--gold-light);}
button.hint-btn:disabled{opacity:.4;cursor:not-allowed;}
button.skip-btn{padding:7px 11px;border-radius:var(--radius);border:1px solid var(--stone-light);color:var(--stone);background:transparent;font-family:'Georgia',serif;font-size:12px;cursor:pointer;}
button.skip-btn:hover{background:var(--parchment-dark);}
button.skip-btn:disabled{opacity:.4;cursor:not-allowed;}
button.send-btn{padding:8px 16px;border-radius:var(--radius);border:none;background:var(--blue);color:#e8f0fb;font-family:'Georgia',serif;font-size:13px;cursor:pointer;}
button.send-btn:hover{background:#224d7a;}
button.send-btn:disabled{background:var(--stone-light);cursor:not-allowed;}

.end-card{text-align:center;padding:2rem 1rem;border:1px solid var(--gold);border-radius:12px;background:var(--parchment-dark);}
.end-card h2{font-size:20px;color:var(--gold-dark);margin-bottom:.5rem;}
.end-card p{color:var(--stone);font-size:14px;font-style:italic;}
button.restart-btn{margin-top:1rem;background:var(--gold-dark);color:var(--gold-light);border:none;border-radius:var(--radius);padding:10px 22px;font-family:'Georgia',serif;font-size:14px;cursor:pointer;}
button.back-sel-btn{margin-top:.6rem;display:block;background:transparent;border:1px solid var(--stone-light);color:var(--stone);border-radius:var(--radius);padding:8px 18px;font-family:'Georgia',serif;font-size:13px;cursor:pointer;margin-left:auto;margin-right:auto;}

#app{display:none;flex-direction:column;flex:1;}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
</style>
</head>

// Filtro por intervalo de notas
function noteInRange(t, start, end, inclusive) {
  // Implementado dinamicamente abaixo com índices
  return true;
}

function buildSectionTurns(abaId, cargoId) {
  // Encontra intervalos de índice para cada aba
  const ranges = {
    abertura:     {from:'I — Início', to:'V — Abertura'},
    encerramento: {from:'XVII — Interrogatório Final', to:'XXII — Encerramento'},
    fogo:         {from:'II — Cerimonial', to:'III — Cerimonial do Fogo'},
    anuncios:     {from:'VIII — Balaústre', to:'XV — Palavra'},
    completo:     null,
  };

  let turns;
  if (abaId === 'completo') {
    turns = TURNS_COMPLETO;
  } else {
    const r = ranges[abaId];
    let inRange = false;
    turns = [];
    for (const t of TURNS_COMPLETO) {
      if (t.type === 'note' && t.text.startsWith(r.from)) inRange = true;
      if (inRange) turns.push(t);
      if (t.type === 'note' && inRange && !t.text.startsWith(r.from) && t.text.startsWith(r.to.split(' ')[0])) {
        // Incluir até o fim da seção — pegar todos até próxima nota principal
      }
    }
    // Recorte mais simples: achar índice de início e fim
    turns = [];
    let started = false, depth = 0;
    for (const t of TURNS_COMPLETO) {
      if (t.type === 'note' && t.text.includes(r.from.split('—')[0].trim())) started = true;
      if (started) {
        turns.push(t);
        if (t.type === 'note' && started && turns.length > 1 &&
            t.text.includes(r.to.split('—')[0].trim())) { depth++; if (depth > 1) break; }
      }
    }
  }

  // Converter: turnos 'me' do cargo ativo viram interativos; outros viram 'other'
  return turns.map(t => {
    if (t.type !== 'me') return t;
    if (t.cargo && t.cargo.includes(cargoId)) {
      // É a vez do usuário
      return { type:'me', signal: t.signal, text: t.text };
    } else {
      // Outro cargo fala — converter para 'other'
      const c = CARGOS.find(c => t.cargo && t.cargo.includes(c.id));
      return {
        type:'other',
        who: c ? `${c.nome} — ${c.hist}` : 'Outro oficial',
        signal: t.signal,
        text: t.text
      };
    }
  });
}

function renderSelecao() {
  const grid = document.getElementById('cargo-grid');
  grid.innerHTML = CARGOS.map(c => `
    <button class="cargo-btn" onclick="selecionarCargo('${c.id}')">
      <span class="cargo-nome">${c.nome}</span>
      <span class="cargo-hist">Ir.·. ${c.hist}</span>
      <span class="cargo-desc">${c.desc}</span>
    </button>`).join('');
}

function selecionarCargo(id) {
  cargoAtivo = id;
  const cargo = CARGOS.find(c => c.id === id);
  document.getElementById('header-cargo-label').textContent =
    `Ir.·. ${cargo.hist} — ${cargo.nome}`;
  document.getElementById('input-label-text').textContent =
    `${cargo.nome} — ${cargo.hist}`;
  document.getElementById('screen-select').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  renderTabs(id);
  carregarAba(ABAS[id][0]);
}

  speechSynthesis.cancel();
  document.getElementById('screen-select').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  cargoAtivo = null;
}

function renderTabs(cargoId) {
  const bar = document.getElementById('tabs-bar');
  bar.innerHTML = ABAS[cargoId].map(abaId =>
    `<button class="ritual-tab" onclick="carregarAba('${abaId}')">${ABA_LABELS[abaId]}</button>`
  ).join('');
}

function carregarAba(abaId) {
  speechSynthesis.cancel();
  if (recognition) try { recognition.stop(); } catch(e){}
  micActive = false;
  document.getElementById('mic-btn').classList.remove('active');

  abaAtiva = abaId;
  turns = buildSectionTurns(abaId, cargoAtivo);
  pos = 0; awaitingInput = false; running = false; attempts = 0;

  document.getElementById('section-label').textContent = ABA_LABELS[abaId];
  document.getElementById('chat').innerHTML = '';
  document.getElementById('end-area').innerHTML = '';
  document.getElementById('input-area').style.display = 'flex';
  document.getElementById('user-input').value = '';
  setInputEnabled(false);

  document.querySelectorAll('.ritual-tab').forEach(t => {
    t.classList.toggle('active', t.textContent === ABA_LABELS[abaId]);
  });

  advance();
}

// ══════════════════════════════════════════════════════════════════
// TTS
// ══════════════════════════════════════════════════════════════════
let muted = false;
let voicePT = null;

function loadVoices() {
  const voices = speechSynthesis.getVoices();
  voicePT = voices.find(v => v.lang === 'pt-BR') ||
            voices.find(v => v.lang.startsWith('pt')) ||
            (voices.length ? voices[0] : null);
  setStatus('waiting', 'Pronto. Selecione seu cargo…');
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text, onEnd) {
  speechSynthesis.cancel();
  if (muted) { setTimeout(onEnd, 100); return; }
  const clean = text.replace(/\[.*?\]/g,'').replace(/●/g,'').trim();
  if (!clean) { setTimeout(onEnd, 100); return; }
  const utt = new SpeechSynthesisUtterance(clean);
  utt.lang='pt-BR'; utt.rate=0.88; utt.pitch=1.0;
  if (voicePT) utt.voice = voicePT;
  utt.onend = onEnd; utt.onerror = () => onEnd();
  setStatus('speaking','Falando…');
  speechSynthesis.speak(utt);
}

function toggleMute() {
  muted = !muted;
  speechSynthesis.cancel();
  document.getElementById('vol-btn').textContent = muted ? '🔇' : '🔊';
}

// ══════════════════════════════════════════════════════════════════
// MIC
// ══════════════════════════════════════════════════════════════════
let recognition = null;
let micActive = false;

function setupRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  recognition = new SR();
  recognition.lang='pt-BR'; recognition.continuous=false; recognition.interimResults=false;
  recognition.onresult = e => {
    document.getElementById('user-input').value = e.results[0][0].transcript;
    stopMic(); submitAnswer();
  };
  recognition.onerror = () => stopMic();
  recognition.onend = () => { if (micActive) stopMic(); };
}

function toggleMic() {
  if (!recognition) setupRecognition();
  if (!recognition) { alert('Seu navegador não suporta reconhecimento de voz.'); return; }
  micActive ? stopMic() : startMic();
}
function startMic() {
  micActive=true; speechSynthesis.cancel();
  document.getElementById('mic-btn').classList.add('active');
  setStatus('listening','Ouvindo… fale sua fala');
  recognition.start();
}
function stopMic() {
  micActive=false;
  document.getElementById('mic-btn').classList.remove('active');
  if (awaitingInput) setStatus('waiting','Sua vez de falar');
  try { recognition.stop(); } catch(e){}
}

// ══════════════════════════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════════════════════════
function setStatus(type, text) {
  document.getElementById('status-dot').className = 'status-dot ' + type;
  document.getElementById('status-text').textContent = text;
}
function setInputEnabled(on) {
  ['send-btn','hint-btn','skip-btn','mic-btn'].forEach(id =>
    document.getElementById(id).disabled = !on);
  document.getElementById('user-input').disabled = !on;
  if (on) { setStatus('waiting','Sua vez de falar'); document.getElementById('user-input').focus(); }
}
function appendMsg(cls, who, signal, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.innerHTML = (who ? `<div class="msg-who">${who}</div>` : '') +
    `<div class="msg-bubble">${signal?`<span class="signal-tag">${signal}</span>`:''}${text}</div>`;
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight; return div;
}
function appendNote(text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'note-bubble'; div.textContent = text;
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
}
function appendTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg other';
  div.innerHTML = `<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight; return div;
}
function appendFeedback(ok, html) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'feedback-box ' + (ok?'ok':'fix');
  div.innerHTML = html;
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
}
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ══════════════════════════════════════════════════════════════════
// ADVANCE
// ══════════════════════════════════════════════════════════════════
async function advance() {
  if (running) return;
  running = true; setInputEnabled(false);
  while (pos < turns.length) {
    const t = turns[pos];
    if (t.type === 'note') {
      appendNote(t.text); pos++; await delay(220);
    } else if (t.type === 'other') {
      const typing = appendTyping();
      await delay(280); typing.remove();
      appendMsg('other', t.who, t.signal||null, esc(t.text));
      await new Promise(res => speak(t.text, res));
      pos++; await delay(280);
    } else if (t.type === 'me') {
      currentCorrect = t.text; awaitingInput = true; running = false;
      setInputEnabled(true); return;
    }
  }
  running = false; showEnd();
}

// ══════════════════════════════════════════════════════════════════
// AVALIAÇÃO HÍBRIDA
// ══════════════════════════════════════════════════════════════════
function normalize(s) {
  return s.toLowerCase()
    .replace(/●/g,'')
    .replace(/\b(ir\.?·?\.?|ven\.?·?\.?|maçon\.?|maç\.?)/gi,'')
    .replace(/[.·,!?;:—\-]/g,'')
    .replace(/\s+/g,' ').trim();
}
function localScore(a, b) {
  const na=normalize(a), nb=normalize(b);
  if (na===nb) return 1;
  const mw = w => w.length > 3;
  const wa=new Set(na.split(' ').filter(mw)), wb=nb.split(' ').filter(mw);
  if (!wa.size||!wb.length) {
    const wa2=new Set(na.split(' ')), wb2=nb.split(' ');
    let m=0; wb2.forEach(w=>{if(wa2.has(w))m++;});
    return m/Math.max(wa2.size,wb2.length);
  }
  let m=0; wb.forEach(w=>{if(wa.has(w))m++;});
  return m/Math.max(wa.size,wb.length);
}
async function evaluateWithClaude(userAnswer, correctAnswer) {
  setStatus('thinking','Verificando…');
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:1000,
        messages:[{role:'user', content:
          `Você é avaliador de ensaio de ritual maçônico (Rito Adonhiramita, Grau de Aprendiz, GLESP).\n\nFala correta: "${correctAnswer}"\nFala do candidato: "${userAnswer}"\n\nConsidere correto se o sentido e palavras principais estão certos. Variações como "Maçom"/"Maçon", "Irmão"/"Ir.", ordem ligeiramente diferente são aceitáveis.\n\nResponda SOMENTE com JSON:\n{"correto": true, "comentario": "frase curta"}\nou\n{"correto": false, "comentario": "frase curta explicando o que faltou"}`
        }]
      })
    });
    const data = await resp.json();
    const text = data.content.find(b=>b.type==='text')?.text||'';
    return JSON.parse(text.replace(/```json|```/g,'').trim());
  } catch(e) { return null; }
}
async function handleResult(isCorrect, comentario) {
  const cargo = CARGOS.find(c => c.id === cargoAtivo);
  if (isCorrect) {
    attempts=0;
    appendFeedback(true, `✓ Correto! ${comentario||`Muito bem, Ir.·. ${cargo.hist}.`}`);
    pos++; await delay(700); advance();
  } else {
    attempts++;
    if (attempts < 2) {
      appendFeedback(false,
        `${comentario?comentario+'<br>':''}Ouça e tente novamente (tentativa ${attempts}/2):<br><em>"${esc(currentCorrect)}"</em>`);
      await new Promise(res => speak('Não foi dessa vez. A fala correta é: '+currentCorrect, res));
      await delay(400); awaitingInput=true; setInputEnabled(true);
    } else {
      attempts=0;
      appendFeedback(false, `Fala correta (2ª tentativa):<br><em>"${esc(currentCorrect)}"</em>`);
      await new Promise(res => speak('A fala correta é: '+currentCorrect, res));
      pos++; await delay(700); advance();
    }
  }
}
async function submitAnswer() {
  if (!awaitingInput) return;
  const val = document.getElementById('user-input').value.trim();
  if (!val) return;
  awaitingInput=false; setInputEnabled(false);
  document.getElementById('user-input').value='';
  const cargo = CARGOS.find(c => c.id === cargoAtivo);
  const turn = turns[pos];
  appendMsg('me', `Ir.·. ${cargo.hist} (você)`, turn.signal||null, esc(val));
  const score = localScore(val, currentCorrect);
  await delay(280);
  if (score >= 0.82) {
    await handleResult(true, `Muito bem, Ir.·. ${cargo.hist}.`);
  } else if (score >= 0.40) {
    const av = await evaluateWithClaude(val, currentCorrect);
    await handleResult(av ? av.correto : score>=0.60, av?.comentario||null);
  } else {
    const av = await evaluateWithClaude(val, currentCorrect);
    await handleResult(av ? av.correto : false, av?.comentario||null);
  }
}
async function showHint() {
  if (!awaitingInput) return;
  const words = currentCorrect.split(' ');
  const hint = words.slice(0, Math.ceil(words.length*0.4)).join(' ')+'…';
  appendFeedback(false, `Dica: <em>"${esc(hint)}"</em>`);
  await new Promise(res => speak('Dica: '+hint, res));
  document.getElementById('user-input').focus();
}
async function skipTurn() {
  if (!awaitingInput) return;
  awaitingInput=false; setInputEnabled(false);
  const cargo = CARGOS.find(c => c.id === cargoAtivo);
  const turn = turns[pos];
  appendMsg('me skip', `Ir.·. ${cargo.hist} (resposta correta)`, turn.signal||null, esc(currentCorrect));
  await new Promise(res => speak(currentCorrect, res));
  pos++; await delay(500); advance();
}
function showEnd() {
  const cargo = CARGOS.find(c => c.id === cargoAtivo);
  document.getElementById('input-area').style.display='none';
  setStatus('waiting','Ensaio concluído');
  document.getElementById('end-area').innerHTML=`
    <div class="end-card">
      <h2>Ensaio concluído</h2>
      <p>Que a Luz da Sabedoria ilumine seus trabalhos, Ir.·. ${cargo.hist}.</p>
      <button class="restart-btn" onclick="carregarAba('${abaAtiva}')">Repetir esta seção</button>
      <button class="back-sel-btn" onclick="voltarSelecao()">← Escolher outro cargo</button>
    </div>`;
}
document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();submitAnswer();}
});

// INIT
renderSelecao();
</script>
